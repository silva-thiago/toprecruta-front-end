services:
  db:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    volumes:
      - ./compose/init-db.sql:/docker-entrypoint-initdb.d/init-script.sql
      - top_solutions:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  top_solutions:
