# Top Solutions - configuracoes da aplicacao
# Servidor
server.port=8081
# Banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/topsolutions
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# JWT
# ATENCAO: gere uma chave segura em producao: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET:dG9wcmVjcnV0YS1qd3Qtc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1taW4tMjU2LWJpdHMtb2s=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
